services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - siard

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/storage
    networks:
      - siard

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "database", "--tries=1", "--timeout=300", "--sleep=3", "--memory=256"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/storage
    networks:
      - siard

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/storage
    networks:
      - siard

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-siard}
      MYSQL_USER: ${DB_USERNAME:-siard}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - siard

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - siard

networks:
  siard:
    driver: bridge

volumes:
  app_storage:
  db_data:
  caddy_data:
  caddy_config:
  ollama_data:
