server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # ── Timeouts — aumentados para suportar jobs longos (Ollama) ──────────
    # O request HTTP agora retorna imediatamente (job async), mas deixamos
    # margens generosas para outros endpoints da aplicação.
    fastcgi_read_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_connect_timeout 60;
    proxy_read_timeout 300;
    proxy_send_timeout 300;
    proxy_connect_timeout 60;
    keepalive_timeout 300;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_CF_CONNECTING_IP $http_cf_connecting_ip;
        fastcgi_param HTTP_CF_CONNECTING_IPV6 $http_cf_connecting_ipv6;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
        fastcgi_param HTTP_X_FORWARDED_CLIENT_PORT $http_x_forwarded_client_port;
        fastcgi_param HTTP_X_CLIENT_PORT $http_x_client_port;
        fastcgi_param HTTP_X_REAL_PORT $remote_port;
        fastcgi_param HTTP_CF_CONNECTING_PORT $http_cf_connecting_port;
        fastcgi_param HTTP_TRUE_CLIENT_PORT $http_true_client_port;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
